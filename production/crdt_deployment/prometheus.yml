# Prometheus Configuration for CRDT Coordination Service
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'crdt-production'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files: []

# Scrape configurations
scrape_configs:
  # CRDT Service Nodes
  - job_name: 'crdt-nodes'
    static_configs:
      - targets:
          - 'crdt-node-1:8001'
          - 'crdt-node-2:8001'
          - 'crdt-node-3:8001'
    metrics_path: '/metrics/detail'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
