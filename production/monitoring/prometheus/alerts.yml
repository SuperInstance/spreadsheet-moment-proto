# Prometheus Alert Rules for SuperInstance

groups:
  - name: superinstance_alerts
    interval: 30s
    rules:
      # High latency alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(superinstance_operation_duration_seconds_bucket[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "High operation latency detected"
          description: "P95 latency is {{ $value }}s on {{ $labels.instance }}"

      # High error rate alert
      - alert: HighErrorRate
        expr: |
          rate(superinstance_operations_total{status="error"}[5m])
          / rate(superinstance_operations_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # Low fast path ratio
      - alert: LowFastPathRatio
        expr: |
          rate(superinstance_operations_total{path_type="fast"}[5m])
          / rate(superinstance_operations_total[5m]) < 0.9
        for: 10m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "Low fast path ratio detected"
          description: "Fast path ratio is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # High GPU temperature
      - alert: HighGPUTemperature
        expr: superinstance_gpu_temperature_celsius > 85
        for: 5m
        labels:
          severity: warning
          component: gpu
        annotations:
          summary: "High GPU temperature detected"
          description: "GPU {{ $labels.gpu_id }} temperature is {{ $value }}°C"

      # High memory usage
      - alert: HighMemoryUsage
        expr: superinstance_memory_usage_bytes / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      # High CPU usage
      - alert: HighCPUUsage
        expr: rate(superinstance_cpu_usage_percent[5m]) > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}%"

      # Disk space low
      - alert: DiskSpaceLow
        expr: superinstance_disk_usage_percent > 90
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "Disk space low"
          description: "Disk usage on {{ $labels.mount_point }} is {{ $value }}%"

      # Replica down
      - alert: ReplicaDown
        expr: up{job="superinstance"} == 0
        for: 1m
        labels:
          severity: critical
          component: availability
        annotations:
          summary: "SuperInstance replica is down"
          description: "Replica {{ $labels.instance }} is not responding"

      # Consensus rounds failing
      - alert: ConsensusRoundsFailing
        expr: |
          rate(superinstance_consensus_rounds_total{result="failed"}[5m])
          / rate(superinstance_consensus_rounds_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: consensus
        annotations:
          summary: "Consensus rounds failing"
          description: "Consensus failure rate is {{ $value | humanizePercentage }}"

      # CRDT merge duration high
      - alert: CRDTMergeSlow
        expr: |
          histogram_quantile(0.95,
            rate(superinstance_crdt_merge_duration_seconds_bucket[5m])
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          component: crdt
        annotations:
          summary: "CRDT merge operations slow"
          description: "P95 CRDT merge duration is {{ $value }}s"

  - name: system_alerts
    interval: 30s
    rules:
      # Node exporter alerts
      - alert: NodeCPUHigh
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage on node"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: NodeMemoryHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage on node"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: NodeDiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "Low disk space on node"
          description: "Disk available is {{ $value }}% on {{ $labels.instance }}"
