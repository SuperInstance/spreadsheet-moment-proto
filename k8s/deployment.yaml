# POLLN API Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polln-api
  labels:
    app: polln-api
    component: api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: polln-api
  template:
    metadata:
      labels:
        app: polln-api
        component: api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: polln-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: polln-api
        image: polln:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: debug
          containerPort: 9229
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: POLLN_API_PORT
          value: "3000"
        - name: POLLN_API_HOST
          value: "0.0.0.0"
        - name: POLLN_AUTH_ENABLED
          value: "true"
        - name: POLLN_RATE_LIMIT_RPM
          value: "1000"
        - name: POLLN_LOG_LEVEL
          value: "info"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: polln-config
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: polln-secret
              key: database-url
        - name: POLLN_AUTH_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: polln-secret
              key: jwt-secret
        envFrom:
        - configMapRef:
            name: polln-config
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        volumeMounts:
        - name: polln-data
          mountPath: /app/.polln
        - name: polln-agents
          mountPath: /app/.agents
        - name: config
          mountPath: /app/config
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: polln-data
        persistentVolumeClaim:
          claimName: polln-data-pvc
      - name: polln-agents
        persistentVolumeClaim:
          claimName: polln-agents-pvc
      - name: config
        configMap:
          name: polln-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - polln-api
              topologyKey: kubernetes.io/hostname
