apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: consensus-service
  namespace: superinstance
  labels:
    app: superinstance
    component: consensus-service
    version: v1
spec:
  serviceName: consensus-service
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: superinstance
      component: consensus-service
  template:
    metadata:
      labels:
        app: superinstance
        component: consensus-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: superinstance-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
      - name: consensus
        image: registry.example.com/superinstance/consensus:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8002
          protocol: TCP
        - name: raft
          containerPort: 8080
          protocol: TCP

        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        envFrom:
        - configMapRef:
            name: superinstance-config

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5

        volumeMounts:
        - name: data
          mountPath: /data
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "fast-ssd"
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: consensus-service
  namespace: superinstance
  labels:
    app: superinstance
    component: consensus-service
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8002
    targetPort: http
  - name: raft
    port: 8080
    targetPort: raft
  selector:
    app: superinstance
    component: consensus-service
