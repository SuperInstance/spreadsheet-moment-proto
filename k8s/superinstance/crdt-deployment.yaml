apiVersion: apps/v1
kind: Deployment
metadata:
  name: crdt-coordinator
  namespace: superinstance
  labels:
    app: superinstance
    component: crdt-coordinator
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: superinstance
      component: crdt-coordinator
  template:
    metadata:
      labels:
        app: superinstance
        component: crdt-coordinator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: superinstance-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Init containers
      initContainers:
      - name: wait-for-consensus
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          until nc -z consensus-service 8002; do
            echo "Waiting for consensus service..."
            sleep 2
          done

      # Main containers
      containers:
      - name: crdt-coordinator
        image: registry.example.com/superinstance/crdt:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP

        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: superinstance-config

        # Environment variables from Secrets
        env:
        - name: CONSENSUS_URL
          value: "http://consensus-service:8002"
        - name: REPLICA_URLS
          value: "http://crdt-coordinator-1.crdt-coordinator:8001,http://crdt-coordinator-2.crdt-coordinator:8001"

        # Resources
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        # Startup probe
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache

      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir:
          sizeLimit: 512Mi

      # Node affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - superinstance
                - key: component
                  operator: In
                  values:
                  - crdt-coordinator
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: crdt-coordinator
  namespace: superinstance
  labels:
    app: superinstance
    component: crdt-coordinator
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8001
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: superinstance
    component: crdt-coordinator

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crdt-coordinator-pdb
  namespace: superinstance
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: superinstance
      component: crdt-coordinator
