apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superinstance-ingress
  namespace: superinstance
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
spec:
  tls:
  - hosts:
    - superinstance.example.com
    - api.superinstance.example.com
    secretName: superinstance-tls
  rules:
  - host: superinstance.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: superinstance-web
            port:
              number: 80

  - host: api.superinstance.example.com
    http:
      paths:
      - path: /api/v1/
        pathType: Prefix
        backend:
          service:
            name: crdt-coordinator
            port:
              number: 8001

      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: crdt-coordinator
            port:
              number: 9090
