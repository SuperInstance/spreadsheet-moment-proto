apiVersion: v1
kind: ConfigMap
metadata:
  name: superinstance-config
  namespace: superinstance
data:
  # Application Configuration
  APP_ENV: "production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # API Configuration
  API_PORT: "3000"
  API_HOST: "0.0.0.0"

  # CRDT Configuration
  CRDT_ENABLED: "true"
  MERGE_INTERVAL_MS: "100"
  CRITICALITY_THRESHOLD: "0.7"
  CONFLICT_THRESHOLD: "0.3"

  # Cache Configuration
  CACHE_TTL_SECONDS: "3600"
  CACHE_MAX_SIZE_MB: "512"

  # Simulation Configuration
  SIMULATION_TIMEOUT_SECONDS: "300"
  SIMULATION_MAX_WORKERS: "10"

  # Monitoring Configuration
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  HEALTH_CHECK_INTERVAL_SECONDS: "30"

  # Feature Flags
  FEATURE_SELF_PLAY: "true"
  FEATURE_HYDRAULIC: "true"
  FEATURE_VALUE_NETWORKS: "true"
  FEATURE_EMERGENCE_DETECTION: "true"
  FEATURE_STIGMERGY: "true"
  FEATURE_COEVOLUTION: "true"
  FEATURE_DREAMING: "true"
