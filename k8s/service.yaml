# POLLN API Service
apiVersion: v1
kind: Service
metadata:
  name: polln-api
  labels:
    app: polln-api
    component: api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
  - name: debug
    port: 9229
    targetPort: debug
    protocol: TCP
  selector:
    app: polln-api
  sessionAffinity: None

---
# POLLN API Headless Service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: polln-api-headless
  labels:
    app: polln-api
    component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
  selector:
    app: polln-api

---
# POLLN API LoadBalancer Service (optional for cloud)
apiVersion: v1
kind: Service
metadata:
  name: polln-api-lb
  labels:
    app: polln-api
    component: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "3600"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  selector:
    app: polln-api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
