# POLLN Secrets
apiVersion: v1
kind: Secret
metadata:
  name: polln-secret
  labels:
    app: polln-api
    component: secret
type: Opaque
stringData:
  # JWT Secret for authentication
  jwt-secret: "CHANGE_THIS_IN_PRODUCTION_USE_KUBERNETES_SECRETS"

  # Database URL
  database-url: "postgresql://polln:CHANGE_THIS@polln-postgres:5432/polln?sslmode=require"

  # Redis Password
  redis-password: "CHANGE_THIS_IN_PRODUCTION"

  # API Keys (if using external services)
  # openai-api-key: "sk-..."
  # anthropic-api-key: "sk-ant-..."

---
# POLLN TLS Certificate Secret (placeholder)
apiVersion: v1
kind: Secret
metadata:
  name: polln-tls-cert
  labels:
    app: polln-api
    component: tls
type: kubernetes.io/tls
data:
  # tls.crt: LS0tLS1CRUdJTi...
  # tls.key: LS0tLS1CRUdJTi...
---
# POLLN WebSocket TLS Certificate Secret (placeholder)
apiVersion: v1
kind: Secret
metadata:
  name: polln-ws-tls-cert
  labels:
    app: polln-api
    component: websocket-tls
type: kubernetes.io/tls
data:
  # tls.crt: LS0tLS1CRUdJTi...
  # tls.key: LS0tLS1CRUdJTi...

---
# POLLN Docker Registry Secret
apiVersion: v1
kind: Secret
metadata:
  name: polln-registry-secret
  labels:
    app: polln-api
    component: registry
type: kubernetes.io/dockerconfigjson
data:
  # .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3R5LmdjaHIuaW8iOnsidXNlcm5hbWUiOiJ...BfQ==
---
# POLLN Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: polln-api
  labels:
    app: polln-api
    component: service-account
automountServiceAccountToken: true
---
# POLLN Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: polln-api
  labels:
    app: polln-api
    component: role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update"]
---
# POLLN Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: polln-api
  labels:
    app: polln-api
    component: role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: polln-api
subjects:
- kind: ServiceAccount
  name: polln-api
  namespace: default
