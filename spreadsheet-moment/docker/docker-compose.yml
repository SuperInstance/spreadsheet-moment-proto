version: '3.8'

services:
  spreadsheet-moment:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SUPERINSTANCE_ENV=production
      - DATABASE_URL=postgresql://superinstance:changeme@db:5432/spreadsheet_moment
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
    depends_on:
      - db
      - redis
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=spreadsheet_moment
      - POSTGRES_USER=superinstance
      - POSTGRES_PASSWORD=changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
