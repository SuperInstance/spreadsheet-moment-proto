apiVersion: apps/v1
kind: Deployment
metadata:
  name: superinstance-api
  namespace: superinstance
  labels:
    app: superinstance-api
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: superinstance-api
  template:
    metadata:
      labels:
        app: superinstance-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: superinstance-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: api
        image: superinstance/api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: debug
          containerPort: 9229
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: superinstance-config
              key: NODE_ENV
        - name: POLLN_API_PORT
          valueFrom:
            configMapKeyRef:
              name: superinstance-config
              key: POLLN_API_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: superinstance-secrets
              key: database-url
        - name: DEEPINFRA_API_KEY
          valueFrom:
            secretKeyRef:
              name: superinstance-secrets
              key: deepinfra-api-key
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: superinstance-config
              key: REDIS_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: api-data
          mountPath: /app/.polln
        - name: api-agents
          mountPath: /app/.agents
      volumes:
      - name: api-data
        persistentVolumeClaim:
          claimName: api-data-pvc
      - name: api-agents
        persistentVolumeClaim:
          claimName: api-agents-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: superinstance-api
  namespace: superinstance
  labels:
    app: superinstance-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9229
    targetPort: 9229
    protocol: TCP
    name: debug
  selector:
    app: superinstance-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: superinstance-api
  namespace: superinstance
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: superinstance-api-hpa
  namespace: superinstance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: superinstance-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
