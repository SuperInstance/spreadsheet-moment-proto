apiVersion: v1
kind: ConfigMap
metadata:
  name: superinstance-config
  namespace: superinstance
data:
  NODE_ENV: "production"
  POLLN_API_PORT: "8000"
  POLLN_API_HOST: "0.0.0.0"
  POLLN_LOG_LEVEL: "info"
  POLLN_RATE_LIMIT_RPM: "1000"
  POLLN_AUTH_ENABLED: "true"
  REDIS_URL: "redis://redis:6379"
  WORKER_CONCURRENCY: "4"
  CUDA_VISIBLE_DEVICES: "0"
  
  # Prometheus Configuration
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
    - job_name: 'superinstance-api'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - superinstance
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: superinstance-api
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:8000
      metrics_path: '/metrics'
    
    - job_name: 'superinstance-worker'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - superinstance
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: superinstance-worker
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:8001
    
    - job_name: 'postgres'
      static_configs:
      - targets: ['postgres-exporter:9187']
    
    - job_name: 'redis'
      static_configs:
      - targets: ['redis-exporter:9121']
