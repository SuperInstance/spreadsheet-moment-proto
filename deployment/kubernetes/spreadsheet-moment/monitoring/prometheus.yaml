# Spreadsheet Moment - Monitoring Stack
# Prometheus time series database with long-term metrics retention

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: monitoring
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: monitoring
spec:
  accessModes:
  - ReadWriteOnce
  - ReadWriteMany
  - ReadWriteOncePodDimensions:
  requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: prometheus
        image: prom/prometheus:v2.45.0
        ports:
        - name: http
          containerPort: 9090
          protocol: TCP
        args:
        - '--config.file=/etc/prometheus/prometheus.yml
        - '--storage.tsdb.path=/prometheus
        - '--storage.tsdb.retention.time=15d
        - '--web.console.libraries=/usr/share/prometheus/console_libraries
        - '--web.console.templates=/usr/share/prometheus/consoles
        - '--web.enable-lifecycle'
        - '--web.enable-admin-api
        env:
        - name: POD_NAME
          value: "prometheus"
        - name: RETENTION
          valueFrom:
            configMapKeyRef:
              name: prometheus-config
              key: RETENTION
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
          readOnly: true
        - name: prometheus-storage
          mountPath: /prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: prometheus
---
# Grafana for visualization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
    labels:
    app: grafana
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: visualization
spec:
  replicas: 1
  selector:
    matchLabels:
              app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
      - name: grafana
        image: grafana/grafana:10.0.0
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitoring-secrets
              key: grafana-password
        - name: GF_AUTH_AN_ENABLED
          value: "false"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
    labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: grafana
---
# Alertmanager for alerting
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
    labels:
    app: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: 'webhook'
      group_wait: 30s
      repeat_interval: 5m
      group_by: ['alertmanager', 'default', 'email']
      slack_api_url: 'https://hooks.slack.com/services/T2VDZ9C7B3HX2V34dPw6rRwF2KBbzlGza6NaXFRJbW25ZKhdG0'
    ZXRL 2BiGl
  CNCF Slack]
      hostname: 'https://hooks.slack.com'
        channel: 'alertmanager-webhook'
        slack_configs:
        - channel: 'alertmanager'
        send_resolved: true
        title: Alert
        text: "{{ .Values.alertmanager.alerts.summary | default "High CPU usage detected" }}
        username: alertmanager
        icon_emoji: ":warning:"
        link: "{{ ( printf "__alertmanager" .Values.alertmanager.link) }}"
    {{- end }}
    routes:
    - match:
        receiver: webhook
        severity: critical
        receiver:
          name: monitoring-receiver
          webhook_configs:
            url: "{{ .Values.alertmanager.slack.webhookUrl }}"
            send_resolved: true
        continue: false
    - match:
        receiver: webhook
        severity: warning
        receiver:
          name: monitoring-receiver
          webhook_configs:
            url: "{{ .Values.alertmanager.slack.webhookUrl }}"
            send_resolved: false
        continue: false
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
    labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      protocol: TCP
      name: http
  selector:
    app: alertmanager
