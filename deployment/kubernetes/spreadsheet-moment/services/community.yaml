# Spreadsheet Moment - Community Features Service Deployment
# Social features, comments, sharing, collaboration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-service
  namespace: spreadsheet-moment
  labels:
    app: community-service
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: community
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: community-service
  template:
    metadata:
      labels:
        app: community-service
        app.kubernetes.io/name: spreadsheet-moment
        app.kubernetes.io/component: community
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: spreadsheet-moment-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: community
        image: spreadsheet-moment/community:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 4004
          protocol: TCP
        - name: metrics
          containerPort: 9464
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: COMMUNITY_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: jwt-secret
        - name: MAX_CONNECTIONS_PER_USER
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: MAX_CONNECTIONS_PER_USER
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4004
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 4004
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: community-data
          mountPath: /app/data
        - name: community-logs
          mountPath: /app/logs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: community-data
        emptyDir: {}
      - name: community-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: community-service
  namespace: spreadsheet-moment
  labels:
    app: community-service
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: community
spec:
  type: ClusterIP
  ports:
  - port: 4004
    targetPort: 4004
    protocol: TCP
    name: http
  selector:
    app: community-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: community-service-hpa
  namespace: spreadsheet-moment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: community-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: community-service-pdb
  namespace: spreadsheet-moment
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: community-service
