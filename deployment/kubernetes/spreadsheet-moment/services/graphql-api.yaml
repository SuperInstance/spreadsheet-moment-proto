# Spreadsheet Moment - GraphQL API Deployment
# Main API server for the platform

apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-api
  namespace: spreadsheet-moment
  labels:
    app: graphql-api
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: graphql-api
  template:
    metadata:
      labels:
        app: graphql-api
        app.kubernetes.io/name: spreadsheet-moment
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: spreadsheet-moment-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: graphql-api
        image: spreadsheet-moment/graphql-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP
        - name: metrics
          containerPort: 9464
          protocol: TCP
        - name: debug
          containerPort: 9229
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: GRAPHQL_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: jwt-secret
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: api-data
          mountPath: /app/data
        - name: api-logs
          mountPath: /app/logs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: api-data
        emptyDir: {}
      - name: api-logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: graphql-api
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: graphql-api
---
apiVersion: v1
kind: Service
metadata:
  name: graphql-api
  namespace: spreadsheet-moment
  labels:
    app: graphql-api
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: http
  - port: 9464
    targetPort: 9464
    protocol: TCP
    name: metrics
  selector:
    app: graphql-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spreadsheet-moment-api
  namespace: spreadsheet-moment
  labels:
    app.kubernetes.io/name: spreadsheet-moment
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: graphql-api-hpa
  namespace: spreadsheet-moment
  labels:
    app: graphql-api
    app.kubernetes.io/name: spreadsheet-moment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: graphql-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: graphql-api-pdb
  namespace: spreadsheet-moment
  labels:
    app: graphql-api
    app.kubernetes.io/name: spreadsheet-moment
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: graphql-api
