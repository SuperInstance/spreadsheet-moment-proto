# Spreadsheet Moment - Real-time Subscription Service Deployment
# WebSocket-based real-time collaboration features

apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-service
  namespace: spreadsheet-moment
  labels:
    app: subscription-service
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: subscription
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: subscription-service
  template:
    metadata:
      labels:
        app: subscription-service
        app.kubernetes.io/name: spreadsheet-moment
        app.kubernetes.io/component: subscription
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: spreadsheet-moment-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: subscription
        image: spreadsheet-moment/subscription:latest
        imagePullPolicy: Always
        ports:
        - name: graphql
          containerPort: 4002
          protocol: TCP
        - name: websocket
          containerPort: 4003
          protocol: TCP
        - name: metrics
          containerPort: 9464
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: SUBSCRIPTION_PORT
        - name: WEBSOCKET_PORT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: WEBSOCKET_PORT
        - name: SUBSCRIPTION_HEARTBEAT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: SUBSCRIPTION_HEARTBEAT
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secrets
              key: jwt-secret
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4002
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 4002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: subscription-data
          mountPath: /app/data
        - name: subscription-logs
          mountPath: /app/logs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: subscription-data
        emptyDir: {}
      - name: subscription-logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: subscription-service
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: subscription-service
  namespace: spreadsheet-moment
  labels:
    app: subscription-service
    app.kubernetes.io/name: spreadsheet-moment
    app.kubernetes.io/component: subscription
spec:
  type: ClusterIP
  ports:
  - port: 4002
    targetPort: 4002
    protocol: TCP
    name: graphql
  - port: 4003
    targetPort: 4003
    protocol: TCP
    name: websocket
  selector:
    app: subscription-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: subscription-service-hpa
  namespace: spreadsheet-moment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: subscription-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: subscription-service-pdb
  namespace: spreadsheet-moment
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: subscription-service
