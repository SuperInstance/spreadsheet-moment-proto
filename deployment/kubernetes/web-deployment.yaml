apiVersion: apps/v1
kind: Deployment
metadata:
  name: superinstance-web
  namespace: superinstance
  labels:
    app: superinstance-web
    component: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: superinstance-web
  template:
    metadata:
      labels:
        app: superinstance-web
        component: web
    spec:
      serviceAccountName: superinstance-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: web
        image: superinstance/web:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: superinstance-web
  namespace: superinstance
  labels:
    app: superinstance-web
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: superinstance-web
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: superinstance-web
  namespace: superinstance
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: superinstance-web-hpa
  namespace: superinstance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: superinstance-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
