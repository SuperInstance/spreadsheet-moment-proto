apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superinstance-ingress
  namespace: superinstance
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
  - hosts:
    - api.superinstance.ai
    - superinstance.ai
    - monitoring.superinstance.ai
    secretName: superinstance-tls
  rules:
  - host: api.superinstance.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: superinstance-api
            port:
              number: 8000
  - host: superinstance.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: superinstance-web
            port:
              number: 8080
  - host: monitoring.superinstance.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
