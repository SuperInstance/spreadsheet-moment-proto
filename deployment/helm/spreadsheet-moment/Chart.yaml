apiVersion: v2
name: spreadsheet-moment
description: A Helm chart for Spreadsheet Moment platform - AI-powered spreadsheet analysis
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://github.com/SuperInstance/polln
sources:
  - https://github.com/SuperInstance/polln/tree/main/deployment/helm/spreadsheet-moment
maintainers:
  - name: SuperInstance Team
    email: support@superinstance.ai
    url: https://github.com/SuperInstance
keywords:
  - spreadsheet
  - ai
  - analytics
  - graphql
  - kubernetes
  - production
annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/SuperInstance/polln/tree/main/deployment/kubernetes/spreadsheet-moment
    - name: Support
      url: https://github.com/SuperInstance/polln/issues
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
