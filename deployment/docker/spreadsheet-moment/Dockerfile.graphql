# Spreadsheet Moment - GraphQL API Server
# Multi-stage production build with security hardening
# Build: docker build -f Dockerfile.graphql -t spreadsheet-moment/graphql-api:latest .
# Size: ~180MB compressed

# =============================================================================
# Stage 1: Base Dependencies
# =============================================================================
FROM node:20-alpine AS base

WORKDIR /app

# Install essential build dependencies
RUN apk add --no-cache \
    python3=3.11.11-r0 \
    make=4.4.1-r2 \
    g++=13.2.1_git20231014-r0 \
    git=2.43.4-r0 \
    ca-certificates=20240226-r0 \
    && rm -rf /var/cache/apk/*

# =============================================================================
# Stage 2: Production Dependencies
# =============================================================================
FROM base AS deps

# Copy package files
COPY package*.json ./

# Install production dependencies only
RUN npm ci --only=production \
    && npm cache clean --force \
    && rm -rf /tmp/*

# =============================================================================
# Stage 3: Build Stage
# =============================================================================
FROM base AS builder

# Copy package files
COPY package*.json ./
COPY tsconfig.json ./
COPY tsconfig.*.json* ./

# Install all dependencies including dev
RUN npm ci

# Copy source code
COPY src ./src
COPY graphql ./graphql
COPY prisma ./prisma

# Build TypeScript
RUN npm run build \
    && npm prune --production \
    && rm -rf src tsconfig*.json

# =============================================================================
# Stage 4: Security Scanning
# =============================================================================
FROM deps AS security

# Copy built artifacts
COPY --from=builder /app/dist ./dist
COPY --from=builder /app/node_modules ./node_modules

# Run security audit (non-blocking)
RUN npm audit --audit-level=high || true

# =============================================================================
# Stage 5: Production Image
# =============================================================================
FROM node:20-alpine AS production

WORKDIR /app

# Install runtime dependencies
RUN apk add --no-cache \
    tini=0.19.0-r2 \
    curl=8.9.0-r0 \
    dumb-init=1.2.5-r2 \
    && rm -rf /var/cache/apk/*

# Create non-root user with specific UID/GID
RUN addgroup -g 1001 -S spreadsheet \
    && adduser -S -u 1001 -G spreadsheet spreadsheet \
    && mkdir -p /app/logs /app/data \
    && chown -R spreadsheet:spreadsheet /app

# Copy production dependencies and built artifacts
COPY --from=builder --chown=spreadsheet:spreadsheet /app/node_modules ./node_modules
COPY --from=builder --chown=spreadsheet:spreadsheet /app/dist ./dist
COPY --from=builder --chown=spreadsheet:spreadsheet /app/package*.json ./

# Copy Prisma schema if exists
COPY --chown=spreadsheet:spreadsheet prisma ./prisma 2>/dev/null || true

# Generate Prisma client if needed
RUN if [ -f "prisma/schema.prisma" ]; then \
        npx prisma generate; \
    fi

# Set production environment
ENV NODE_ENV=production \
    PORT=4000 \
    HOST=0.0.0.0 \
    LOG_LEVEL=info

# Switch to non-root user
USER spreadsheet

# Expose ports
# 4000: GraphQL API
# 9464: Prometheus metrics
EXPOSE 4000 9464

# Health check
HEALTHCHECK --interval=30s \
            --timeout=10s \
            --start-period=40s \
            --retries=3 \
    CMD curl -f http://localhost:4000/health || exit 1

# Use tini for proper signal handling
ENTRYPOINT ["/sbin/tini", "--"]

# Start GraphQL server
CMD ["node", "dist/graphql/server.js"]

# =============================================================================
# Stage 6: Development Image (optional)
# =============================================================================
FROM production AS development

USER root

# Install development tools
RUN apk add --no-cache \
    openssh-client \
    vim \
    bash

# Install all dependencies for development
COPY --chown=spreadsheet:spreadsheet package*.json ./
RUN npm ci

# Copy source for hot-reload
COPY --chown=spreadsheet:spreadsheet src ./src
COPY --chown=spreadsheet:spreadsheet graphql ./graphql
COPY --chown=spreadsheet:spreadsheet tsconfig.json ./
COPY --chown=spreadsheet:spreadsheet tsconfig.*.json* ./

USER spreadsheet

ENV NODE_ENV=development \
    LOG_LEVEL=debug

# Enable debugging
EXPOSE 9229

CMD ["node", "--inspect=0.0.0.0:9229", "--watch", "dist/graphql/server.js"]
