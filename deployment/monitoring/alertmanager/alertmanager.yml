# Alertmanager Configuration for Spreadsheet Moment
# Supports multiple notification channels with intelligent routing

global:
  # Global resolve timeout
  resolve_timeout: 5m

  # Slack configuration
  slack_api_url: 'https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXX'

  # SMTP configuration for email alerts
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@superinstance.ai'
  smtp_auth_username: 'alerts@superinstance.ai'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # PagerDuty configuration
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Route configuration - defines how alerts are grouped and routed
route:
  # Default receiver for all alerts
  receiver: 'default'

  # Group alerts by these labels to reduce notification noise
  group_by: ['alertname', 'cluster', 'service']

  # Wait time before sending first notification for a new group
  group_wait: 30s

  # Wait time before sending notification about new alerts for an existing group
  group_interval: 5m

  # Wait time before re-sending a notification after it's been resolved
  repeat_interval: 12h

  # Child routes for specific alert types
  routes:
    # Critical alerts go to PagerDuty + Slack + Email
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true

    # Warning alerts go to Slack only
    - match:
        severity: warning
      receiver: 'warning-alerts'

    # Info alerts go to a dedicated Slack channel
    - match:
        severity: info
      receiver: 'info-alerts'

    # Security alerts go to security team
    - match:
        component: security
      receiver: 'security-alerts'
      group_by: ['alertname', 'component']

    # Database alerts go to database team
    - match:
        component: database
      receiver: 'database-alerts'

    # SLO breaches go to SRE team
    - match:
        component: slo
      receiver: 'slo-alerts'

# Receivers - define notification destinations
receivers:
  # Default receiver - Slack only
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        username: 'Alertmanager'
        icon_emoji: ':warning:'

  # Critical alerts - PagerDuty, Slack, and Email
  - name: 'critical-alerts'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: 'critical'
        description: '{{ .GroupLabels.alertname }}'
        client: 'Spreadsheet Moment'
        client_url: 'https://monitoring.superinstance.ai'
        details:
          firing: '{{ template "pagerduty.default.instances" .Alerts.Firing }}'
          resolved: '{{ template "pagerduty.default.instances" .Alerts.Resolved }}'
          num_firing: '{{ .Alerts.Firing | len }}'
          num_resolved: '{{ .Alerts.Resolved | len }}'

    slack_configs:
      - channel: '#critical-alerts'
        title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          *Dashboard:* {{ .Annotations.dashboard_url }}
          {{ end }}
        send_resolved: true
        color: 'danger'
        username: 'Critical Alertmanager'
        icon_emoji: ':rotating_light:'

    email_configs:
      - to: 'on-call@superinstance.ai'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
        html: |-
          {{ range .Alerts }}
          <h2>{{ .Labels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Runbook:</strong> <a href="{{ .Annotations.runbook_url }}">View Runbook</a></p>
          {{ end }}
        send_resolved: true

  # Warning alerts - Slack only
  - name: 'warning-alerts'
    slack_configs:
      - channel: '#warnings'
        title: ':warning: WARNING: {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: 'warning'
        username: 'Warning Alertmanager'
        icon_emoji: ':warning:'

  # Info alerts - Dedicated Slack channel
  - name: 'info-alerts'
    slack_configs:
      - channel: '#info'
        title: ':information_source: INFO: {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true
        color: 'good'
        username: 'Info Alertmanager'
        icon_emoji: ':information_source:'

  # Security alerts - Security team Slack + Email
  - name: 'security-alerts'
    slack_configs:
      - channel: '#security-alerts'
        title: ':lock: SECURITY: {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true
        color: 'danger'
        username: 'Security Alertmanager'
        icon_emoji: ':lock:'

    email_configs:
      - to: 'security@superinstance.ai'
        headers:
          Subject: '[SECURITY] {{ .GroupLabels.alertname }}'
        html: |-
          {{ range .Alerts }}
          <h2>{{ .Labels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          {{ end }}
        send_resolved: true

  # Database alerts - Database team
  - name: 'database-alerts'
    slack_configs:
      - channel: '#database-alerts'
        title: ':database: DATABASE: {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true
        color: 'warning'
        username: 'Database Alertmanager'
        icon_emoji: ':database:'

  # SLO alerts - SRE team
  - name: 'slo-alerts'
    slack_configs:
      - channel: '#sre-slo'
        title: ':chart_with_upwards_trend: SLO: {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true
        color: 'danger'
        username: 'SLO Alertmanager'
        icon_emoji: ':chart_with_upwards_trend:'

    email_configs:
      - to: 'sre@superinstance.ai'
        headers:
          Subject: '[SLO] {{ .GroupLabels.alertname }}'
        html: |-
          {{ range .Alerts }}
          <h2>{{ .Labels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          {{ end }}
        send_resolved: true

# Inhibition rules - prevent alert spam
inhibit_rules:
  # Inhibit warning alerts if critical alert is firing for same component
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']

  # Inhibit info alerts if warning is firing
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'component']

  # Inhibit database alerts if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      component: 'database'
    equal: ['instance']

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'
