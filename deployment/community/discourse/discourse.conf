# Discourse Configuration File
# This file is sourced by the Discourse container

## -------------------------------------------------------------------------
## General Settings
## -------------------------------------------------------------------------

# Discourse hostname
DISCOURSE_HOSTNAME=community.superinstance.ai

# Developer emails (comma-separated)
DISCOURSE_DEVELOPER_EMAILS=admin@superinstance.ai,community@superinstance.ai

# Discourse locale
DISCOURSE_LOCALE=en

## -------------------------------------------------------------------------
## Database Settings
## -------------------------------------------------------------------------

DISCOURSE_DB_HOST=discourse-postgres
DISCOURSE_DB_PORT=5432
DISCOURSE_DB_USERNAME=discourse
DISCOURSE_DB_PASSWORD=CHANGE_THIS_PASSWORD
DISCOURSE_DB_NAME=discourse

# Database connection pool
DISCOURSE_DB_POOL=20

# Database timeout
DISCOURSE_DB_TIMEOUT=5000

## -------------------------------------------------------------------------
## Redis Settings
## -------------------------------------------------------------------------

DISCOURSE_REDIS_HOST=discourse-redis
DISCOURSE_REDIS_PORT=6379

## -------------------------------------------------------------------------
## Email Settings
## -------------------------------------------------------------------------

DISCOURSE_SMTP_ADDRESS=smtp.resend.com
DISCOURSE_SMTP_PORT=587
DISCOURSE_SMTP_USER_NAME=apikey
DISCOURSE_SMTP_PASSWORD=CHANGE_THIS_PASSWORD
DISCOURSE_SMTP_AUTHENTICATION=plain
DISCOURSE_SMTP_ENABLE_START_TLS=true

# Notification email
DISCOURSE_NOTIFICATION_EMAIL=noreply@superinstance.ai

## -------------------------------------------------------------------------
## CDN and Storage Settings
## -------------------------------------------------------------------------

# S3 Configuration
DISCOURSE_S3_BUCKET=superinstance-community
DISCOURSE_S3_ACCESS_KEY_ID=CHANGE_THIS_KEY_ID
DISCOURSE_S3_SECRET_ACCESS_KEY=CHANGE_THIS_SECRET
DISCOURSE_S3_REGION=us-east-1
DISCOURSE_S3_CDN_URL=https://cdn.superinstance.ai

# Backup location
DISCOURSE_BACKUP_LOCATION=s3

## -------------------------------------------------------------------------
## Security Settings
## -------------------------------------------------------------------------

# Rate limiting
DISCOURSE_MAX_REQS_PER_MINUTE=1000
DISCOURSE_MAX_REQS_PER_IP_MODE=rate

# CSRF protection
DISCOURSE_CSRF_PROTECTION=true

# Content Security Policy
DISCOURSE_CONTENT_SECURITY_POLICY=true

## -------------------------------------------------------------------------
## Plugin Settings
## -------------------------------------------------------------------------

# Enabled plugins (comma-separated)
DISCOURSE_PLUGINS=discourse-solved,discourse-assign,discourse-gamification,discourse-signatures,discourse-calendar,discourse-data-explorer

## -------------------------------------------------------------------------
## Performance Settings
## -------------------------------------------------------------------------

# Unicorn workers
DISCOURSE_UNICORN_WORKERS=4

# Sidekiq workers
DISCOURSE_SIDEKIQ_WORKERS=2

## -------------------------------------------------------------------------
## Logging Settings
## -------------------------------------------------------------------------

# Log level (debug, info, warn, error, fatal)
DISCOURSE_LOG_LEVEL=info

## -------------------------------------------------------------------------
## Feature Settings
## -------------------------------------------------------------------------

# Enable verbose logging
DISCOURSE_VERBOSE_LOGGING=false

# Enable developer tools
DISCOURSE_ENABLE_DEVELOPER_TOOLS=false

# Enable single user mode (for maintenance)
DISCOURSE_SINGLE_USER_MODE=false

# Maximum attachment size (MB)
DISCOURSE_MAX_ATTACHMENT_SIZE_MB=10

# Maximum image size (MB)
DISCOURSE_MAX_IMAGE_SIZE_MB=5

## -------------------------------------------------------------------------
## Security Settings
## -------------------------------------------------------------------------

# Enable HTTP strict transport security
DISCOURSE_ENABLE_HSTS=true

# Enable frame protection
DISCOURSE_ENABLE_FRAME_PROTECTION=true

## -------------------------------------------------------------------------
## API Settings
## -------------------------------------------------------------------------

# Enable API
DISCOURSE_ENABLE_API=true

# API rate limit (requests per minute)
DISCOURSE_API_RATE_LIMIT=60

## -------------------------------------------------------------------------
## Backup Settings
## -------------------------------------------------------------------------

# Backup frequency (daily, weekly)
DISCOURSE_BACKUP_FREQUENCY=daily

# Backup retention (days)
DISCOURSE_BACKUP_RETENTION_DAYS=30
