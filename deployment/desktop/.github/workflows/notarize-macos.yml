name: macOS Notarization

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  notarize:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: spreadsheet-moment-x86_64-apple-darwin
          path: artifacts

      - name: Import certificate
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}

      - name: Sign application
        run: |
          APP_PATH=$(find artifacts -name "Spreadsheet Moment.app" -type d | head -n 1)
          codesign --force --deep --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

      - name: Notarize application
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(find artifacts -name "Spreadsheet Moment.app" -type d | head -n 1)
          xcrun notarytool submit "$APP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple application
        run: |
          APP_PATH=$(find artifacts -name "Spreadsheet Moment.app" -type d | head -n 1)
          xcrun stapler staple "$APP_PATH"

      - name: Upload notarized artifact
        uses: actions/upload-artifact@v4
        with:
          name: spreadsheet-moment-macos-notarized
          path: artifacts
