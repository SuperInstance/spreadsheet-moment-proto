name: Backup and Disaster Recovery

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual triggering

env:
  NODE_VERSION: '20'

jobs:
  # Backup website content and configuration
  backup-content:
    name: Backup Website Content
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Create backup timestamp
        run: |
          echo "BACKUP_TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV
          echo "BACKUP_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Create backup directory structure
        run: |
          mkdir -p backups/${{ env.BACKUP_DATE }}
          mkdir -p backups/${{ env.BACKUP_DATE }}/content
          mkdir -p backups/${{ env.BACKUP_DATE }}/config
          mkdir -p backups/${{ env.BACKUP_DATE }}/database

      - name: Backup source code
        run: |
          # Create tar archive of website source
          tar -czf backups/${{ env.BACKUP_DATE }}/content/website-source-${{ env.BACKUP_TIMESTAMP }}.tar.gz \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.git \
            .

          echo "Source code backup created: website-source-${{ env.BACKUP_TIMESTAMP }}.tar.gz"

      - name: Backup configuration files
        run: |
          # Backup all configuration files
          cp -r *.json *.js *.toml *.config.* backups/${{ env.BACKUP_DATE }}/config/ 2>/dev/null || true
          cp -r .env* backups/${{ env.BACKUP_DATE }}/config/ 2>/dev/null || true
          cp -r .github/workflows/*.yml backups/${{ env.BACKUP_DATE }}/config/ 2>/dev/null || true

          # Create config archive
          tar -czf backups/${{ env.BACKUP_DATE }}/config/website-config-${{ env.BACKUP_TIMESTAMP }}.tar.gz \
            -C backups/${{ env.BACKUP_DATE }}/config .

          echo "Configuration backup created: website-config-${{ env.BACKUP_TIMESTAMP }}.tar.gz"

      - name: Backup build artifacts
        run: |
          # Build the website
          npm ci
          npm run build

          # Archive build output
          tar -czf backups/${{ env.BACKUP_DATE }}/content/build-output-${{ env.BACKUP_TIMESTAMP }}.tar.gz \
            -C dist .

          echo "Build output backup created: build-output-${{ env.BACKUP_TIMESTAMP }}.tar.gz"

      - name: Create backup manifest
        run: |
          cat > backups/${{ env.BACKUP_DATE }}/backup-manifest-${{ env.BACKUP_TIMESTAMP }}.md << EOF
          # Backup Manifest

          **Backup ID:** ${{ env.BACKUP_TIMESTAMP }}
          **Date:** ${{ env.BACKUP_DATE }}
          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref }}
          **Commit:** ${{ github.sha }}

          ## Contents:

          1. **Source Code:** website-source-${{ env.BACKUP_TIMESTAMP }}.tar.gz
            - Complete website source (excluding node_modules, dist, .git)
            - Size: \$(du -h backups/${{ env.BACKUP_DATE }}/content/website-source-${{ env.BACKUP_TIMESTAMP }}.tar.gz | cut -f1)

          2. **Configuration:** website-config-${{ env.BACKUP_TIMESTAMP }}.tar.gz
            - All configuration files (*.json, *.js, *.toml, *.config.*)
            - Environment files (.env*)
            - GitHub Actions workflows

          3. **Build Output:** build-output-${{ env.BACKUP_TIMESTAMP }}.tar.gz
            - Static site build from dist/ directory
            - Ready for deployment

          ## Recovery Instructions:

          1. Extract source code:
            \`\`\`bash
            tar -xzf website-source-${{ env.BACKUP_TIMESTAMP }}.tar.gz
            npm ci
            \`\`\`

          2. Restore configuration:
            \`\`\`bash
            tar -xzf website-config-${{ env.BACKUP_TIMESTAMP }}.tar.gz
            \`\`\`

          3. Deploy build output:
            \`\`\`bash
            tar -xzf build-output-${{ env.BACKUP_TIMESTAMP }}.tar.gz
            # Upload to Cloudflare Pages or other hosting
            \`\`\`

          ## Verification:

          To verify backup integrity:
          \`\`\`bash
          # Check tar archives
          tar -tzf website-source-${{ env.BACKUP_TIMESTAMP }}.tar.gz | head -10
          tar -tzf website-config-${{ env.BACKUP_TIMESTAMP }}.tar.gz | head -10
          tar -tzf build-output-${{ env.BACKUP_TIMESTAMP }}.tar.gz | head -10
          \`\`\`

          ---
          *Generated by Backup and Disaster Recovery workflow*
          EOF

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: website-backup-${{ env.BACKUP_DATE }}
          path: |
            backups/${{ env.BACKUP_DATE }}/
          retention-days: 90  # Keep backups for 90 days

      - name: Generate backup report
        run: |
          echo "# Backup Report - ${{ env.BACKUP_DATE }}" > backup-report.md
          echo "" >> backup-report.md
          echo "## Summary" >> backup-report.md
          echo "- **Backup ID:** ${{ env.BACKUP_TIMESTAMP }}" >> backup-report.md
          echo "- **Date:** ${{ env.BACKUP_DATE }}" >> backup-report.md
          echo "- **Repository:** ${{ github.repository }}" >> backup-report.md
          echo "- **Commit:** ${{ github.sha }}" >> backup-report.md
          echo "" >> backup-report.md

          echo "## Backup Contents" >> backup-report.md
          echo "" >> backup-report.md
          echo "| File | Size | Description |" >> backup-report.md
          echo "|------|------|-------------|" >> backup-report.md

          # List backup files with sizes
          find backups/${{ env.BACKUP_DATE }} -type f -name "*.tar.gz" -o -name "*.md" | while read file; do
            size=$(du -h "$file" | cut -f1)
            name=$(basename "$file")
            echo "| $name | $size | $(dirname "$file" | xargs basename) |" >> backup-report.md
          done

          echo "" >> backup-report.md
          echo "## Status: ✅ Backup Completed Successfully" >> backup-report.md

          mkdir -p reports
          mv backup-report.md reports/

      - name: Upload backup report
        uses: actions/upload-artifact@v4
        with:
          name: backup-reports
          path: |
            website/reports/
          retention-days: 30

  # Disaster recovery simulation (optional)
  recovery-test:
    name: Disaster Recovery Test
    runs-on: ubuntu-latest
    needs: backup-content
    if: github.event_name == 'workflow_dispatch'  # Manual only
    defaults:
      run:
        working-directory: ./website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest backup
        uses: actions/download-artifact@v4
        with:
          name: website-backup-$(date +%Y-%m-%d)
          path: recovery-test/

      - name: Verify backup integrity
        run: |
          echo "Verifying backup integrity..."

          # Find backup files
          find recovery-test -name "*.tar.gz" | while read file; do
            echo "Testing: $(basename "$file")"
            if tar -tzf "$file" > /dev/null 2>&1; then
              echo "✅ $(basename "$file"): Integrity check passed"
            else
              echo "❌ $(basename "$file"): Integrity check failed"
              exit 1
            fi
          done

      - name: Simulate recovery
        run: |
          echo "Simulating disaster recovery..."
          mkdir -p recovered-site

          # Extract source code
          tar -xzf recovery-test/*/content/website-source-*.tar.gz -C recovered-site/

          # Extract build output
          mkdir -p recovered-site/dist
          tar -xzf recovery-test/*/content/build-output-*.tar.gz -C recovered-site/dist/

          echo "Recovery simulation complete"
          echo "Recovered files in: recovered-site/"

          # List recovered files
          echo "Recovered structure:"
          find recovered-site -type f | head -20

      - name: Test recovered build
        run: |
          echo "Testing recovered build..."
          cd recovered-site

          # Install dependencies
          npm ci

          # Run basic tests
          npm run build

          echo "✅ Recovered build test passed"

      - name: Generate recovery test report
        run: |
          echo "# Disaster Recovery Test Report" > recovery-test-report.md
          echo "" >> recovery-test-report.md
          echo "## Test Summary" >> recovery-test-report.md
          echo "- **Test Date:** $(date)" >> recovery-test.md
          echo "- **Backup Used:** $(find recovery-test -name "*.tar.gz" | head -1 | xargs basename)" >> recovery-test-report.md
          echo "- **Status:** ✅ Recovery Test Passed" >> recovery-test-report.md
          echo "" >> recovery-test-report.md
          echo "## Test Steps:" >> recovery-test-report.md
          echo "1. Downloaded latest backup artifacts" >> recovery-test-report.md
          echo "2. Verified backup integrity" >> recovery-test-report.md
          echo "3. Extracted source code and build output" >> recovery-test-report.md
          echo "4. Tested build process with recovered code" >> recovery-test-report.md
          echo "5. Verified build output" >> recovery-test-report.md
          echo "" >> recovery-test-report.md
          echo "## Conclusion:" >> recovery-test-report.md
          echo "The backup and recovery process is functional. In case of disaster:" >> recovery-test-report.md
          echo "1. Download latest backup from GitHub Actions artifacts" >> recovery-test-report.md
          echo "2. Extract files using instructions in backup manifest" >> recovery-test-report.md
          echo "3. Deploy to Cloudflare Pages or alternative hosting" >> recovery-test-report.md

          mkdir -p reports
          mv recovery-test-report.md reports/

      - name: Upload recovery test report
        uses: actions/upload-artifact@v4
        with:
          name: recovery-test-reports
          path: |
            website/reports/
          retention-days: 30