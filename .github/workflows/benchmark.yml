name: Performance Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run benchmarks daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create benchmarks directory
        run: mkdir -p benchmarks

      - name: Download baseline from main branch
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const response = await fetch('https://raw.githubusercontent.com/${{ github.repository }}/main/benchmarks/baseline.json');
              if (response.ok) {
                const baseline = await response.text();
                fs.writeFileSync('benchmarks/baseline.json', baseline);
                console.log('Baseline downloaded successfully');
              } else {
                console.log('No baseline found on main branch');
              }
            } catch (error) {
              console.log('Failed to download baseline:', error.message);
            }

      - name: Run benchmarks
        run: |
          if [ -f benchmarks/baseline.json ]; then
            npm run bench:ci
          else
            echo "No baseline found, running benchmarks without comparison"
            npm run bench:run -- --format json --output benchmarks/results.json
          fi

      - name: Generate benchmark report
        if: always()
        run: |
          npm run bench:run -- \
            --format html \
            --output benchmarks/report.html \
            ${HAS_BASELINE:+"--baseline benchmarks/baseline.json"}

      - name: Check for regressions
        if: github.event_name == 'pull_request'
        run: |
          npm run bench:compare -- \
            --baseline benchmarks/baseline.json \
            --report benchmarks/comparison.html \
            --threshold 10

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmarks/results.json
            benchmarks/report.html
            benchmarks/comparison.html

      - name: Save as baseline on main branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm run bench:run -- \
            --format json \
            --output benchmarks/baseline.json \
            --save-baseline benchmarks/baseline.json

      - name: Commit baseline to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add benchmarks/baseline.json
          git diff --staged --quiet || git commit -m "Update performance baseline [skip ci]"
          git push

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('benchmarks/results.json', 'utf8'));

              let comment = '## 📊 Benchmark Results\n\n';
              comment += `**Total:** ${results.summary.total} | `;
              comment += `**Passed:** ${results.summary.passed} | `;
              comment += `**Failed:** ${results.summary.failed}\n\n`;

              // Check for comparison data
              if (results.summary.regressed > 0 || results.summary.improved > 0) {
                comment += '### Comparison with Baseline\n\n';
                if (results.summary.regressed > 0) {
                  comment += `⚠️ **Regressions:** ${results.summary.regressed}\n`;
                }
                if (results.summary.improved > 0) {
                  comment += `✨ **Improvements:** ${results.summary.improved}\n`;
                }
              }

              comment += '\n---\n';
              comment += '*Full report available in workflow artifacts*';

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Failed to create comment:', error.message);
            }

      - name: Fail on regressions
        if: github.event_name == 'pull_request'
        run: |
          node -e "
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('benchmarks/results.json', 'utf8'));
              if (results.summary.regressed > 0) {
                console.log('Performance regressions detected!');
                process.exit(1);
              }
            } catch (error) {
              console.log('No regression data found');
            }
          "
