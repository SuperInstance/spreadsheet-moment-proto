name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

  lint:
    name: Lint Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test-chromium:
    name: Test on Chromium
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Chromium tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: chromium-test-results
          path: test-results/

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: chromium-html-report
          path: test-results/html-report/

  test-firefox:
    name: Test on Firefox
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps firefox

      - name: Run Firefox tests
        run: npm run test:e2e -- --project=firefox

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: firefox-test-results
          path: test-results/

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: firefox-html-report
          path: test-results/html-report/

  test-webkit:
    name: Test on WebKit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps webkit

      - name: Run WebKit tests
        run: npm run test:e2e -- --project=webkit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: webkit-test-results
          path: test-results/

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: webkit-html-report
          path: test-results/html-report/

  test-mobile:
    name: Test on Mobile Viewports
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Mobile tests
        run: npm run test:e2e:mobile

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: mobile-test-results
          path: test-results/

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: mobile-html-report
          path: test-results/html-report/

  test-accessibility:
    name: Test Accessibility
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Accessibility tests
        run: npm run test:e2e:accessibility

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: accessibility-test-results
          path: test-results/

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: accessibility-html-report
          path: test-results/html-report/

  test-i18n:
    name: Test Internationalization
    runs-on: ubuntu-latest
    needs: install
    strategy:
      matrix:
        locale: [es, fr, de, zh, ja, ko, ar]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run i18n tests for ${{ matrix.locale }}
        run: npm run test:e2e -- --project=i18n-${{ matrix.locale }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: i18n-${{ matrix.locale }}-test-results
          path: test-results/

  test-visual-regression:
    name: Test Visual Regression
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Visual Regression tests
        run: npm run test:e2e:visual

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: visual-regression-screenshots
          path: test-results/screenshots/

  test-performance:
    name: Test Performance
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Performance tests
        run: npm run test:e2e -- --grep="@performance"

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: test-results/performance/

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [test-chromium, test-firefox, test-webkit, test-mobile, test-accessibility, test-i18n]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all test results
        uses: actions/download-artifact@v3
        with:
          path: test-results/

      - name: Merge test results
        run: npx playwright merge-reports test-results/*/report.json

      - name: Generate HTML report
        run: npx playwright show-report

      - name: Upload combined report
        uses: actions/upload-artifact@v3
        with:
          name: combined-test-report
          path: playwright-report/

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-results/summary.json', 'utf8');
            const summary = JSON.parse(report);

            let comment = `## E2E Test Results\n\n`;
            comment += `**Total Tests:** ${summary.total}\n`;
            comment += `**Passed:** ${summary.passed} ✅\n`;
            comment += `**Failed:** ${summary.failed} ❌\n`;
            comment += `**Skipped:** ${summary.skipped} ⏭️\n`;
            comment += `**Duration:** ${summary.duration}ms\n\n`;

            if (summary.failed > 0) {
              comment += `### Failed Tests\n`;
              summary.failedTests.forEach(test => {
                comment += `- ${test.title}\n`;
              });
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test-chromium, test-firefox, test-webkit, test-mobile, test-accessibility]
    if: failure()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "E2E Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "E2E tests have failed on *${{ github.ref_name }}* branch"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
