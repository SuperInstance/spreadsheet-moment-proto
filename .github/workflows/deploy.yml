name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Prepare deployment
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.meta.outputs.version }}
      namespace: ${{ steps.env.outputs.namespace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          else
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              ENV="production"
            else
              ENV="staging"
            fi
          fi

          case $ENV in
            dev)
              NAMESPACE="polln-dev"
              ;;
            staging)
              NAMESPACE="polln-staging"
              ;;
            production)
              NAMESPACE="polln-prod"
              ;;
          esac

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Extract image metadata
        id: meta
        run: |
          VERSION="${{ github.ref_name }}-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # Build and push image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.environment }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Deploy to Kubernetes
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [prepare, build]
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url: https://${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          case "${{ needs.prepare.outputs.environment }}" in
            dev)
              echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > kubeconfig
              ;;
            staging)
              echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
              ;;
            production)
              echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
              ;;
          esac
          export KUBECONFIG=kubeconfig

      - name: Verify cluster access
        run: |
          export KUBECONFIG=kubeconfig
          kubectl cluster-info
          kubectl get nodes

      - name: Update deployment image
        run: |
          export KUBECONFIG=kubeconfig
          kubectl set image deployment/polln-api \
            polln-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }} \
            -n ${{ needs.prepare.outputs.namespace }}

      - name: Wait for rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/polln-api \
            -n ${{ needs.prepare.outputs.namespace }} \
            --timeout=5m

      - name: Verify deployment
        id: deploy
        run: |
          export KUBECONFIG=kubeconfig

          # Get service URL
          if [ "${{ needs.prepare.outputs.environment }}" == "production" ]; then
            URL="polln.example.com"
          elif [ "${{ needs.prepare.outputs.environment }}" == "staging" ]; then
            URL="polln-staging.example.com"
          else
            # Get LoadBalancer IP for dev
            IP=$(kubectl get service polln-api-lb -n ${{ needs.prepare.outputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            URL="$IP.nip.io"
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT

          # Run health checks
          kubectl run health-check --rm -i --restart=Never --image=curlimages/curl -- \
            curl -f http://polln-api.${{ needs.prepare.outputs.namespace }}.svc.cluster.local:3000/health || exit 1

      - name: Run smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          POD=$(kubectl get pod -l app=polln-api -n ${{ needs.prepare.outputs.namespace }} -o jsonpath='{.items[0].metadata.name}')

          kubectl exec $POD -n ${{ needs.prepare.outputs.namespace }} -- \
            node -e "console.log('Smoke test passed')"

  # Deploy to Docker Swarm (alternative)
  deploy-swarm:
    name: Deploy to Docker Swarm
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: github.event.inputs.environment == 'dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Swarm
        run: |
          echo "Deploying to ${{ needs.prepare.outputs.environment }} environment"
          # Add your Swarm deployment commands here
          # docker stack deploy -c docker-compose.${{ needs.prepare.outputs.environment }}.yml polln

  # Post-deployment tests
  test:
    name: Post-Deployment Tests
    runs-on: ubuntu-latest
    needs: [prepare, deploy-k8s]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: |
          npm run test:integration -- \
            --apiUrl=https://${{ needs.deploy-k8s.outputs.url }} \
            --timeout=60000

      - name: Verify metrics endpoint
        run: |
          curl -f https://${{ needs.deploy-k8s.outputs.url }}/metrics || exit 1

      - name: Verify health endpoint
        run: |
          curl -f https://${{ needs.deploy-k8s.outputs.url }}/health || exit 1

  # Rollback on failure
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [prepare, deploy-k8s, test]
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          case "${{ needs.prepare.outputs.environment }}" in
            production)
              echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
              ;;
            staging)
              echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
              ;;
            dev)
              echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > kubeconfig
              ;;
          esac
          export KUBECONFIG=kubeconfig

      - name: Rollback deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout undo deployment/polln-api \
            -n ${{ needs.prepare.outputs.namespace }}

      - name: Wait for rollback
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/polln-api \
            -n ${{ needs.prepare.outputs.namespace }} \
            --timeout=5m

      - name: Notify rollback
        run: |
          echo "Deployment to ${{ needs.prepare.outputs.environment }} failed and was rolled back"
          # Add notification logic here (Slack, email, etc.)

  # Notify deployment status
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [prepare, deploy-k8s, test]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy-k8s.result }}" == "success" ] && [ "${{ needs.test.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=Deployment to ${{ needs.prepare.outputs.environment }} succeeded" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=Deployment to ${{ needs.prepare.outputs.environment }} failed" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        run: |
          echo "${{ steps.status.outputs.message }}"
          # Add notification logic here (Slack webhook, email, etc.)
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"${{ steps.status.outputs.message }}"}'
