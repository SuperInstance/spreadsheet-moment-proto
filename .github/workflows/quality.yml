name: Code Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  coverage-check:
    name: Coverage Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold
        run: |
          # Check if coverage meets 90% threshold
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
            echo "Current coverage: ${COVERAGE}%"
            
            if (( $(echo "$COVERAGE < 90" | bc -l) )); then
              echo "::error::Coverage ${COVERAGE}% is below 90% threshold"
              exit 1
            fi
            echo "Coverage check passed: ${COVERAGE}%"
          fi

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = data.total;
              const avg = ((total.lines.pct + total.branches.pct + total.functions.pct + total.statements.pct) / 4).toFixed(2);
              
              const body = `## Coverage Report
- Lines: ${total.lines.pct}%
- Branches: ${total.branches.pct}%
- Functions: ${total.functions.pct}%
- Statements: ${total.statements.pct}%
- **Average: ${avg}%**`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  complexity-check:
    name: Code Complexity Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file sizes
        run: |
          # Find large TypeScript files
          find src -name '*.ts' -size +50k -exec echo "Large file found: {}" \;
          
          # Warn if any files are too large
          LARGE_FILES=$(find src -name '*.ts' -size +50k | wc -l)
          if [ $LARGE_FILES -gt 0 ]; then
            echo "::warning::Found $LARGE_FILES files larger than 50KB"
          fi

      - name: Check for code smells
        run: |
          # Check for very long functions (heuristic)
          grep -rn "function\|=>" src --include="*.ts" | awk 'NF > 100' | head -5 || echo "No extremely long functions found"

  security-quality-gate:
    name: Security Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          # Check if audit found critical vulnerabilities
          if [ $? -ne 0 ]; then
            echo "::error::Critical vulnerabilities found"
            exit 1
          fi
