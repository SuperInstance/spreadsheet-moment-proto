name: Comprehensive Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests (${{ matrix.module }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - analytics
          - i18n
          - accessibility
          - performance
          - security
          - api
          - community
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.module }} tests
        run: npm run test:${{ matrix.module }}
        continue-on-error: false

      - name: Generate coverage report
        if: matrix.node-version == '20.x'
        run: npm run test:coverage -- --testPathPattern=${{ matrix.module }}

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: ${{ matrix.module }}
          name: codecov-${{ matrix.module }}
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-all:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm run test:ci

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: all-modules
          name: codecov-full-suite
          fail_ci_if_error: true

      - name: Archive coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: coverage/

      - name: Check coverage thresholds
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 82" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 82% threshold"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets threshold"

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security tests
        run: npm run test:security

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: npm run test:performance

      - name: Check test execution time
        run: |
          START_TIME=$(date +%s)
          npm run test:ci
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          if [ $DURATION -gt 300 ]; then
            echo "Tests took ${DURATION}s, exceeding 5-minute target"
            exit 1
          fi
          echo "Tests completed in ${DURATION}s"

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check test files for linting
        run: npm run lint -- tests/

  report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [test-all, security-scan, performance-check, lint]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v3
        with:
          name: coverage-reports
          path: coverage/

      - name: Generate test summary
        run: |
          echo "# Test Report" > test-report.md
          echo "" >> test-report.md
          echo "## Coverage Summary" >> test-report.md
          cat coverage/coverage-summary.json | jq -r '"- Lines: " + (.total.lines.pct | tostring) + "%"' >> test-report.md
          cat coverage/coverage-summary.json | jq -r '"- Functions: " + (.total.functions.pct | tostring) + "%"' >> test-report.md
          cat coverage/coverage-summary.json | jq -r '"- Branches: " + (.total.branches.pct | tostring) + "%"' >> test-report.md
          cat coverage/coverage-summary.json | jq -r '"- Statements: " + (.total.statements.pct | tostring) + "%"' >> test-report.md

      - name: Upload test report
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: test-report.md

      - name: Comment PR with test report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
