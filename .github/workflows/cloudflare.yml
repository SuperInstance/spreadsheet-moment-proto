name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'deployment/cloudflare/**'
      - 'api/**'
      - 'workers/**'
      - '.github/workflows/cloudflare.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'deployment/cloudflare/**'
      - 'api/**'
      - 'workers/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - production

env:
  NODE_VERSION: '20'
  WRANGLER_VERSION: '3'

jobs:
  # Test job
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: cloudflare-workers
          name: codecov-cloudflare

  # Build job
  build:
    name: Build Worker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Worker
        run: npm run build:worker
        env:
          NODE_ENV: production

      - name: Upload Worker bundle
        uses: actions/upload-artifact@v3
        with:
          name: worker-bundle
          path: deployment/cloudflare/workers/dist/
          retention-days: 7

  # D1 migration job
  migrate-d1:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.spreadsheetmoment.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Run D1 migrations
        run: |
          wrangler d1 execute spreadsheet-moment-db-prod \
            --file=./deployment/cloudflare/d1/schema.sql \
            --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Deploy to development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build, migrate-d1]
    if: github.event_name == 'pull_request'
    environment:
      name: development
      url: https://spreadsheet-moment-dev.workers.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Worker bundle
        uses: actions/download-artifact@v3
        with:
          name: worker-bundle
          path: deployment/cloudflare/workers/dist/

      - name: Deploy to Cloudflare Workers (dev)
        run: |
          wrangler deploy deployment/cloudflare/wrangler.toml \
            --env=development \
            --var=ENVIRONMENT:development \
            --var=LOG_LEVEL:debug
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run smoke tests
        run: npm run test:smoke -- --environment=development

  # Deploy to production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, migrate-d1]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: https://api.spreadsheetmoment.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Worker bundle
        uses: actions/download-artifact@v3
        with:
          name: worker-bundle
          path: deployment/cloudflare/workers/dist/

      - name: Deploy to Cloudflare Workers (production)
        run: |
          wrangler deploy deployment/cloudflare/wrangler.toml \
            --env=production \
            --var=ENVIRONMENT:production \
            --var=LOG_LEVEL:info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Configure R2 CORS
        run: |
          wrangler r2 bucket cors put spreadsheet-moment-assets \
            --config=./deployment/cloudflare/r2/cors.json
          wrangler r2 bucket cors put spreadsheet-moment-uploads \
            --config=./deployment/cloudflare/r2/cors.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Configure R2 lifecycle rules
        run: |
          wrangler r2 bucket lifecycle put spreadsheet-moment-uploads \
            --file=./deployment/cloudflare/r2/lifecycle.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run smoke tests
        run: npm run test:smoke -- --environment=production

      - name: Run integration tests
        run: npm run test:integration -- --environment=production

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: ${{ job.status }}
          text: 'Production deployment successful! 🚀'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: ${{ job.status }}
          text: 'Production deployment failed! ❌'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Rollback job (manual trigger)
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Rollback to previous version
        run: |
          PREVIOUS_SHA=$(git rev-parse HEAD~1)
          echo "Rolling back to: $PREVIOUS_SHA"
          git checkout $PREVIOUS_SHA
          npm install
          npm run build:worker
          wrangler deploy deployment/cloudflare/wrangler.toml --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          text: "Production rollback completed! 🔄"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Cleanup old deployments
  cleanup:
    name: Cleanup Old Deployments
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: List deployments
        run: wrangler deployments list --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Cleanup old deployments (keep last 10)
        run: |
          # This is a placeholder - implement actual cleanup logic
          echo "Cleanup old deployments (keeping last 10)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
