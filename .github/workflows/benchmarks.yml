name: Benchmarks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scale: [small]  # Use small scale for CI, can add medium/large for nightly runs

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for trend analysis

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib psutil

      - name: Install POLLN
        run: |
          npm install
          npm run build

      - name: Create benchmark directories
        run: |
          mkdir -p reports/benchmarks/current
          mkdir -p reports/benchmarks/baselines
          mkdir -p reports/benchmarks/history
          mkdir -p reports/benchmarks/cache

      - name: Download baseline
        continue-on-error: true
        uses: actions/download-artifact@v3
        with:
          name: benchmark-baseline
          path: reports/benchmarks/baselines

      - name: Run benchmarks
        run: |
          python simulations/tooling/benchmarks/benchmark_runner.py \
            --scale ${{ matrix.scale }} \
            --parallel \
            --output-dir reports/benchmarks/current
        env:
          PYTHONUNBUFFERED: 1

      - name: Check regressions
        id: regression_check
        continue-on-error: true
        run: |
          python simulations/tooling/benchmarks/regression_detector.py \
            --baseline-dir reports/benchmarks/baselines \
            --current-dir reports/benchmarks/current \
            --output reports/benchmarks/current/regression_report.json
        env:
          PYTHONUNBUFFERED: 1

      - name: Generate report
        if: always()
        run: |
          python simulations/tooling/benchmarks/report_generator.py \
            --current-dir reports/benchmarks/current \
            --regression regression_report.json \
            --format all
        env:
          PYTHONUNBUFFERED: 1

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results-${{ matrix.scale }}
          path: |
            reports/benchmarks/current/
            reports/benchmarks/benchmark_report.html
          retention-days: 30

      - name: Upload baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-baseline
          path: reports/benchmarks/current/
          retention-days: 90

      - name: Copy to history
        if: github.event_name == 'push'
        run: |
          commit_hash=$(git rev-parse --short HEAD)
          timestamp=$(date +%Y%m%d_%H%M%S)
          history_dir="reports/benchmarks/history/$commit_hash"
          mkdir -p "$history_dir"
          cp -r reports/benchmarks/current/* "$history_dir/"

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        run: |
          python simulations/tooling/benchmarks/benchmark_ci.py \
            --scale ${{ matrix.scale }} \
            --output-dir reports/benchmarks/current \
            --baseline-dir reports/benchmarks/baselines
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for critical regressions
        if: steps.regression_check.outcome == 'success'
        run: |
          # Check if report contains critical regressions
          if grep -q '"severity": "critical"' reports/benchmarks/current/regression_report.json 2>/dev/null; then
            echo "❌ Critical regressions detected"
            exit 1
          fi

  nightly-benchmarks:
    name: Nightly Benchmarks (Full Scale)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        scale: [medium, large]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib psutil
          npm install
          npm run build

      - name: Create benchmark directories
        run: |
          mkdir -p reports/benchmarks/current
          mkdir -p reports/benchmarks/baselines
          mkdir -p reports/benchmarks/history

      - name: Run full-scale benchmarks
        run: |
          python simulations/tooling/benchmarks/benchmark_runner.py \
            --scale ${{ matrix.scale }} \
            --parallel \
            --output-dir reports/benchmarks/current

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: nightly-benchmarks-${{ matrix.scale }}
          path: reports/benchmarks/current/
          retention-days: 90

  trend-analysis:
    name: Trend Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: benchmark

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib

      - name: Download historical data
        uses: actions/download-artifact@v3
        continue-on-error: true
        with:
          name: benchmark-history
          path: reports/benchmarks/history

      - name: Generate trend analysis
        run: |
          python simulations/tooling/benchmarks/trend_tracker.py \
            --history-dir reports/benchmarks/history \
            --visualize \
            --output reports/benchmarks/current/trend_report.json

      - name: Upload trend report
        uses: actions/upload-artifact@v3
        with:
          name: trend-analysis
          path: |
            reports/benchmarks/current/trend_report.json
            reports/benchmarks/trends/*.png
          retention-days: 90
