name: SuperInstance CI/CD Pipeline

on:
  push:
    branches: [main, develop, papers-main]
  pull_request:
    branches: [main, papers-main]
  release:
    types: [published]

env:
  DOCKER_REGISTRY: registry.example.com
  PROJECT_NAME: superinstance
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # =============================================================================
  # Code Quality & Linting
  # =============================================================================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black mypy pylint
          pip install pytest pytest-cov pytest-asyncio
          pip install fastapi uvicorn aiohttp
          pip install numpy cupy-cuda12x

      - name: Install Node dependencies
        run: npm ci

      - name: Run Black (Python formatter)
        run: |
          black --check --diff src/ tests/ || true

      - name: Run MyPy (type checker)
        run: |
          mypy src/ --ignore-missing-imports || true

      - name: Run Pylint (linter)
        run: |
          pylint src/ --fail-under=8 || true

      - name: Run ESLint (JavaScript/TypeScript)
        run: npm run lint
        continue-on-error: true

  # =============================================================================
  # Unit Tests
  # =============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11']
        node-version: ['18.x', '20.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install pytest-mock
          pip install fastapi uvicorn aiohttp pydantic
          pip install numpy scipy

      - name: Install Node dependencies
        run: npm ci

      - name: Run Python unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --cov=src/ \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --tb=short

      - name: Run Node unit tests
        run: npm test -- --coverage --maxWorkers=2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unit-tests
          name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false

  # =============================================================================
  # Integration Tests
  # =============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock
          pip install fastapi uvicorn aiohttp pydantic
          pip install asyncpg redis
          pip install numpy scipy

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --asyncio-mode=auto
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Test CRDT coordination service
        run: |
          python -m pytest tests/integration/test_crdt_integration.py -v

  # =============================================================================
  # Simulation Validation
  # =============================================================================
  simulation-validation:
    name: Validate Simulation Schemas
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy
          pip install networkx

      - name: Validate P24 (Self-Play)
        run: |
          python papers/24-self-play-mechanisms/simulation_schema.py

      - name: Validate P25 (Hydraulic Intelligence)
        run: |
          python papers/25-hydraulic-intelligence/simulation_schema.py

      - name: Validate P26 (Value Networks)
        run: |
          python papers/26-value-networks/simulation_schema.py

      - name: Validate P27 (Emergence Detection)
        run: |
          python papers/27-emergence-detection/simulation_schema.py

      - name: Validate P28 (Stigmergic Coordination)
        run: |
          python papers/28-stigmergic-coordination/simulation_schema.py

      - name: Validate P29 (Competitive Coevolution)
        run: |
          python papers/29-competitive-coevolution/simulation_schema.py

      - name: Validate P30 (Granularity Analysis)
        run: |
          python papers/30-granularity-analysis/simulation_schema.py

      - name: Run validation script
        run: |
          python scripts/validate_all_schemas.py
        continue-on-error: true

  # =============================================================================
  # Security Scanning
  # =============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Run Safety (dependency vulnerabilities)
        run: |
          safety check --json > safety-report.json || true
        continue-on-error: true

      - name: Run Bandit (SAST)
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Run Trivy (container scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            safety-report.json
            bandit-report.json
            trivy-results.sarif

  # =============================================================================
  # Build Docker Images
  # =============================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, simulation-validation]
    if: github.event_name == 'push' || github.event_name == 'release'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.PROJECT_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build CRDT service image
        uses: docker/build-push-action@v5
        with:
          context: ./production/crdt_deployment
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.PROJECT_NAME }}/crdt:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.PROJECT_NAME }}/crdt:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # =============================================================================
  # Deploy to Development
  # =============================================================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: https://dev.superinstance.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/superinstance/dev/ --kubeconfig=kubeconfig
          kubectl rollout status deployment/superinstance-dev --kubeconfig=kubeconfig

      - name: Verify deployment
        run: |
          kubectl get pods -l app=superinstance,env=dev --kubeconfig=kubeconfig

      - name: Run smoke tests
        run: |
          ./scripts/smoke-test.sh https://dev.superinstance.example.com

  # =============================================================================
  # Deploy to Staging
  # =============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.superinstance.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/superinstance/staging/ --kubeconfig=kubeconfig
          kubectl rollout status deployment/superinstance-staging --kubeconfig=kubeconfig

      - name: Verify deployment
        run: |
          kubectl get pods -l app=superinstance,env=staging --kubeconfig=kubeconfig

      - name: Run integration tests against staging
        run: |
          pytest tests/integration/ --target=staging -v

  # =============================================================================
  # Deploy to Production
  # =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://superinstance.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Create deployment tag
        run: |
          echo "DEPLOYMENT_TAG=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Deploy to Kubernetes (blue-green)
        run: |
          # Apply new deployment
          kubectl apply -f k8s/superinstance/production/ --kubeconfig=kubeconfig

          # Wait for new pods to be ready
          kubectl rollout status deployment/superinstance-production --kubeconfig=kubeconfig

          # Run smoke tests
          ./scripts/smoke-test.sh https://superinstance.example.com

          # If tests pass, switch traffic
          kubectl apply -f k8s/superinstance/production/service-switch.yaml --kubeconfig=kubeconfig

      - name: Verify production deployment
        run: |
          kubectl get pods -l app=superinstance,env=production --kubeconfig=kubeconfig

      - name: Monitor health
        run: |
          for i in {1..10}; do
            curl -f https://superinstance.example.com/health || exit 1
            sleep 10
          done

      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful"

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/superinstance-production --kubeconfig=kubeconfig

  # =============================================================================
  # Post-Deploy Monitoring
  # =============================================================================
  post-deploy-monitor:
    name: Post-Deploy Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for stabilization
        run: sleep 300

      - name: Check Prometheus metrics
        run: |
          curl -s "${{ secrets.PROMETHEUS_URL }}/api/v1/query?query=up{job='superinstance'}" | jq .

      - name: Check error rates
        run: |
          ERROR_RATE=$(curl -s "${{ secrets.PROMETHEUS_URL }}/api/v1/query?query=rate(errors_total[5m])" | jq '.data.result[0].value[1]')
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "Error rate too high: $ERROR_RATE"
            exit 1
          fi

      - name: Trigger rollback on critical issues
        if: failure()
        run: |
          echo "Critical issues detected, triggering rollback"
          # Send alert to ops team
