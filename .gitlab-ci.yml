# GitLab CI/CD Configuration for Comprehensive Test Suite

stages:
  - test
  - coverage
  - security
  - report

variables:
  NODE_VERSION: "20"
  COVERAGE_THRESHOLD: "82"

# Cache node_modules between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

before_script:
  - npm ci --prefer-offline --no-audit

# Module-specific test jobs
test:analytics:
  stage: test
  image: node:${NODE_VERSION}
  script:
    - npm run test:analytics
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

