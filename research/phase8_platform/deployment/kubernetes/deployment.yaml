apiVersion: v1
kind: Namespace
metadata:
  name: superinstance-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: superinstance-platform
data:
  PLATFORM_DATA_DIR: "/data"
  PLATFORM_LOG_LEVEL: "INFO"
  PLATFORM_MAX_CONCURRENT: "5"
  PLATFORM_MAX_GPU_MEMORY_GB: "4.0"
  PLATFORM_ENABLE_AUTO_VALIDATION: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: superinstance-platform
type: Opaque
stringData:
  # Add your actual API keys here
  DEEPINFRA_API_KEY: "your_api_key_here"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-data-pvc
  namespace: superinstance-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: superinstance-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      containers:
      - name: platform
        image: superinstance/platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PLATFORM_DATA_DIR
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: PLATFORM_DATA_DIR
        - name: PLATFORM_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: PLATFORM_LOG_LEVEL
        - name: PLATFORM_MAX_CONCURRENT
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: PLATFORM_MAX_CONCURRENT
        - name: DEEPINFRA_API_KEY
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: DEEPINFRA_API_KEY
        volumeMounts:
        - name: platform-data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: platform-data
        persistentVolumeClaim:
          claimName: platform-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api-service
  namespace: superinstance-platform
spec:
  selector:
    app: platform-api
  ports:
  - port: 80
    targetPort: 8000
    name: http
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-api-hpa
  namespace: superinstance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: superinstance-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - platform.superinstance.io
    secretName: platform-tls
  rules:
  - host: platform.superinstance.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-api-service
            port:
              number: 80
