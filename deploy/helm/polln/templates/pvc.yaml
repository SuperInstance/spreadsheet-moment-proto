{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "polln.fullname" . }}-data
  labels:
    {{- include "polln.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - {{ .Values.persistence.data.accessMode }}
  {{- if .Values.persistence.data.storageClass }}
  storageClassName: {{ .Values.persistence.data.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.data.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "polln.fullname" . }}-agents
  labels:
    {{- include "polln.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - {{ .Values.persistence.agents.accessMode }}
  {{- if .Values.persistence.agents.storageClass }}
  storageClassName: {{ .Values.persistence.agents.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.agents.size }}
{{- end }}
