{{- if .Capabilities.APIVersions.Has "apps/v1" }}
apiVersion: apps/v1
{{- else }}
apiVersion: apps/v1beta2
{{- end }}
kind: Deployment
metadata:
  name: {{ include "polln.fullname" . }}
  labels:
    {{- include "polln.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "polln.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "polln.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "polln.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        - name: debug
          containerPort: {{ .Values.service.debugPort }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.polln.env.NODE_ENV | quote }}
        - name: POLLN_API_PORT
          value: {{ .Values.polln.env.POLLN_API_PORT | quote }}
        - name: POLLN_API_HOST
          value: {{ .Values.polln.env.POLLN_API_HOST | quote }}
        - name: POLLN_LOG_LEVEL
          value: {{ .Values.polln.env.POLLN_LOG_LEVEL | quote }}
        - name: POLLN_AUTH_ENABLED
          value: {{ .Values.polln.env.POLLN_AUTH_ENABLED | quote }}
        - name: POLLN_RATE_LIMIT_RPM
          value: {{ .Values.polln.env.POLLN_RATE_LIMIT_RPM | quote }}
        {{- if .Values.secrets.jwtSecret }}
        - name: POLLN_AUTH_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "polln.fullname" . }}-secret
              key: jwt-secret
        {{- end }}
        {{- if .Values.secrets.databaseUrl }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "polln.fullname" . }}-secret
              key: database-url
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: REDIS_URL
          value: {{ include "polln.redisUrl" . | quote }}
        - name: REDIS_HOST
          value: {{ include "polln.redisHost" . | quote }}
        - name: REDIS_PORT
          value: {{ include "polln.redisPort" . | quote }}
        {{- if .Values.secrets.redisPassword }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "polln.fullname" . }}-secret
              key: redis-password
        {{- end }}
        {{- end }}
        {{- if .Values.postgresql.enabled }}
        - name: DB_HOST
          value: {{ include "polln.postgresqlHost" . | quote }}
        - name: DB_PORT
          value: {{ include "polln.postgresqlPort" . | quote }}
        - name: DB_NAME
          value: {{ .Values.postgresql.auth.database | quote }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "polln.fullname" . }}-config
        {{- with .Values.envFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: polln-data
          mountPath: /app/.polln
        - name: polln-agents
          mountPath: /app/.agents
        - name: config
          mountPath: /app/config
          readOnly: true
        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.lifecycle }}
        lifecycle:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.sidecars }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      volumes:
      - name: polln-data
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "polln.fullname" . }}-data
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: polln-agents
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "polln.fullname" . }}-agents
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: config
        configMap:
          name: {{ include "polln.fullname" . }}-config
      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      affinity:
        {{- include "polln.antiAffinity" . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
