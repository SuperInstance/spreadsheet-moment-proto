<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{email_subject}}</title>
    <style type="text/css">
        /* Reset styles */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        table { border-collapse: collapse !important; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }

        /* Mobile styles */
        @media screen and (max-width: 525px) {
            .wrapper { width: 100% !important; max-width: 100% !important; }
            .mobile-padding { padding-left: 20px !important; padding-right: 20px !important; }
            .mobile-center { text-align: center !important; }
            .mobile-full { width: 100% !important; display: block !important; }
            .mobile-hide { display: none !important; }
            .mobile-font { font-size: 16px !important; }
        }

        /* Base styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            color: #333333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 40px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff;
            font-size: 24px;
            margin: 0;
            font-weight: 600;
        }

        .content {
            padding: 40px;
        }

        .content h2 {
            color: #667eea;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #555555;
        }

        .button {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            margin: 20px 0;
        }

        .button:hover {
            opacity: 0.9;
        }

        .footer {
            background-color: #f8f9fa;
            padding: 30px 40px;
            text-align: center;
            font-size: 14px;
            color: #6c757d;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .divider {
            height: 1px;
            background-color: #e9ecef;
            margin: 30px 0;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .feature-list li {
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .feature-list li:before {
            content: "✓";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }

        .highlight-box {
            background-color: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .testimonial {
            font-style: italic;
            color: #6c757d;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            margin: 20px 0;
        }

        .social-links {
            text-align: center;
            margin: 20px 0;
        }

        .social-links a {
            display: inline-block;
            margin: 0 10px;
            color: #667eea;
            text-decoration: none;
        }

        .unsubscribe {
            font-size: 12px;
            color: #adb5bd;
            margin-top: 20px;
        }

        .unsubscribe a {
            color: #adb5bd;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <h1>SuperInstance</h1>
            </div>

            <!-- Content -->
            <div class="content">
                {{{email_content}}}
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>You received this email because you subscribed to SuperInstance updates.</p>
                <p>
                    <a href="{{unsubscribe_url}}">Unsubscribe</a> |
                    <a href="{{preferences_url}}">Manage Preferences</a> |
                    <a href="{{view_in_browser}}">View in Browser</a>
                </p>
                <div class="divider"></div>
                <p>&copy; 2026 SuperInstance. All rights reserved.</p>
                <p>1234 Innovation Way, San Francisco, CA 94102</p>
                <div class="social-links">
                    <a href="https://twitter.com/superinstance">Twitter</a> |
                    <a href="https://linkedin.com/company/superinstance">LinkedIn</a> |
                    <a href="https://github.com/SuperInstance">GitHub</a> |
                    <a href="https://discord.gg/superinstance">Discord</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
