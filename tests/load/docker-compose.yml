version: '3.8'

services:
  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: spreadsheet-moment-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - load-test-network
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: spreadsheet-moment-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - load-test-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Redis - Caching Layer for Tests
  redis:
    image: redis:7-alpine
    container_name: spreadsheet-moment-redis-test
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - load-test-network
    restart: unless-stopped

  # PostgreSQL - Test Database
  postgres:
    image: postgres:15-alpine
    container_name: spreadsheet-moment-postgres-test
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=spreadsheet_moment_test
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - POSTGRES_INITDB_ARGS=--max-connections=500
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - load-test-network
    restart: unless-stopped

  # InfluxDB - Time Series Data for Load Test Metrics
  influxdb:
    image: influxdb:2.7-alpine
    container_name: spreadsheet-moment-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=spreadsheet-moment
      - DOCKER_INFLUXDB_INIT_BUCKET=load-test-metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - load-test-network
    restart: unless-stopped

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: spreadsheet-moment-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./grafana/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - load-test-network
    restart: unless-stopped

  # Promtail - Log Collector
  promtail:
    image: grafana/promtail:latest
    container_name: spreadsheet-moment-promtail
    volumes:
      - ./grafana/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - load-test-network
    depends_on:
      - loki
    restart: unless-stopped

  # k6 Operator for Kubernetes (optional)
  # Uncomment if running in k8s environment
  # k6-operator:
  #   image: ghcr.io/grafana/k6-operator:latest
  #   # Configuration for k8s

networks:
  load-test-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:
  influxdb-data:
  influxdb-config:
  loki-data:
